<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - BzMe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-50 dark:bg-slate-900 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 dark:border-slate-700">
        <h2 class="text-3xl font-bold text-purple-700 dark:text-purple-400 mb-6 text-center">Create Account</h2>
        
        <form id="registrationForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 dark:text-gray-200">Full Name</label>
                <input type="text" id="fullName" class="w-full px-4 py-2 rounded-lg border dark:bg-slate-700 dark:border-slate-600 focus:ring-2 focus:ring-purple-500 outline-none transition">
                <p id="nameError" class="text-red-500 text-xs mt-1 hidden">Name is required.</p>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 dark:text-gray-200">Email Address</label>
                <input type="email" id="email" class="w-full px-4 py-2 rounded-lg border dark:bg-slate-700 dark:border-slate-600 focus:ring-2 focus:ring-purple-500 outline-none transition">
                <p id="emailError" class="text-red-500 text-xs mt-1 hidden">Please enter a valid email.</p>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 dark:text-gray-200">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 rounded-lg border dark:bg-slate-700 dark:border-slate-600 focus:ring-2 focus:ring-purple-500 outline-none transition">
                <p id="passError" class="text-red-500 text-xs mt-1 hidden">Password must be at least 6 characters.</p>
            </div>

            <button type="submit" class="w-full bg-orange-500 text-white py-3 rounded-lg font-bold hover:bg-orange-600 transition shadow-lg mt-4">
                Register Now
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Already have an account? <a href="index.html" class="text-purple-600 font-semibold">Back to Home</a>
        </p>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            let isValid = true;

            const name = document.getElementById('fullName');
            const email = document.getElementById('email');
            const password = document.getElementById('password');

            if (name.value.trim() === "") {
                document.getElementById('nameError').classList.remove('hidden');
                isValid = false;
            } else {
                document.getElementById('nameError').classList.add('hidden');
            }

            const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
            if (!email.value.match(emailPattern)) {
                document.getElementById('emailError').classList.remove('hidden');
                isValid = false;
            } else {
                document.getElementById('emailError').classList.add('hidden');
            }

            if (password.value.length < 6) {
                document.getElementById('passError').classList.remove('hidden');
                isValid = false;
            } else {
                document.getElementById('passError').classList.add('hidden');
            }

            if (isValid) {
                alert("Registrasi Berhasil! Selamat datang, " + name.value);
                form.reset();
                window.location.href = "index.html"; 
            }
        });

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
